services:
  database:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: let_me_cook
      MARIADB_USER: let_me_cook_user
      MARIADB_PASSWORD: let_me_cook_password
    volumes:
      - database_data:/var/lib/mysql
    ports:
      - "3307:3306"

volumes:
  database_data:
